<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IELTS Lesson 1: Exam Orientation</title>
  <style>
    :root {
      --ih-blue: #3B44B5;
      --green: #29A768;
      --orange: #F3AB63;
      --gold: #F4CF80;
      --coral: #F06C6A;
      --pink: #E070A3;
      --magenta: #C2598E;
      --plum: #913371;
      --violet: #5C3E9B;
      --lime: #BCDC6E;
      --ink: #1c1c28;
      --bg: #fbfbfd;
      --card: #ffffff;
      --muted: #676a7b;
      --shadow: 0 18px 55px rgba(59,68,181,.13);
      --shadow-soft: 0 8px 25px rgba(28,28,40,.08);
      --max: 1120px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 8% 4%, rgba(244,207,128,.32), transparent 26rem),
        radial-gradient(circle at 96% 0%, rgba(224,112,163,.17), transparent 30rem),
        linear-gradient(180deg, #fff 0%, var(--bg) 42%, #f7f8ff 100%);
    }

    button, input, textarea, select { font: inherit; }
    button { border: 0; cursor: pointer; }
    button:disabled { cursor: not-allowed; }

    .app { min-height: 100vh; display: flex; flex-direction: column; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(251,251,253,.88);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(59,68,181,.1);
    }

    .topbar-inner {
      width: min(var(--max), calc(100% - 24px));
      margin: 0 auto;
      padding: 10px 0 12px;
      display: grid;
      gap: 10px;
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      min-width: 0;
      gap: 10px;
      user-select: none;
    }

    .brand img {
      max-height: 42px;
      max-width: 190px;
      object-fit: contain;
    }

    .brand-fallback {
      display: none;
      align-items: center;
      gap: 8px;
      font-weight: 900;
      color: var(--ih-blue);
      letter-spacing: -.02em;
    }

    .brand-fallback-mark {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: var(--ih-blue);
      color: #fff;
      font-weight: 1000;
      font-size: 20px;
    }

    .status-pills {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 7px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 7px 10px;
      background: #fff;
      border: 1px solid rgba(59,68,181,.14);
      box-shadow: 0 4px 18px rgba(28,28,40,.04);
      color: var(--ink);
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .xp-pill {
      background: linear-gradient(135deg, rgba(244,207,128,.42), #fff);
    }

    .progress-track {
      height: 9px;
      border-radius: 999px;
      background: rgba(59,68,181,.12);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--ih-blue), #6970e7);
      border-radius: 999px;
      transition: width .45s ease;
    }

    main {
      flex: 1;
      width: min(var(--max), calc(100% - 24px));
      margin: 18px auto 0;
      padding-bottom: 108px;
    }

    .priority-banner,
    .review-banner {
      border-radius: 16px;
      padding: 12px 14px;
      margin-bottom: 14px;
      line-height: 1.45;
      border: 1px solid rgba(59,68,181,.14);
      background: #fff;
      box-shadow: var(--shadow-soft);
      font-size: 14px;
    }

    .priority-banner { border-left: 7px solid var(--gold); }
    .review-banner { border-left: 7px solid var(--ih-blue); color: var(--muted); }

    .layout { display: grid; gap: 16px; }

    .guide-card {
      display: grid;
      grid-template-columns: 112px 1fr;
      gap: 12px;
      align-items: end;
      background: rgba(255,255,255,.76);
      border: 1px solid rgba(59,68,181,.12);
      border-radius: 18px;
      box-shadow: var(--shadow-soft);
      padding: 12px;
      overflow: hidden;
    }

    .guide-img-wrap {
      align-self: end;
      min-height: 126px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      animation: guideIn .55s cubic-bezier(.2,.9,.2,1.2);
    }

    .guide-img {
      width: 130px;
      max-width: 100%;
      max-height: 190px;
      object-fit: contain;
      object-position: bottom center;
      filter: drop-shadow(0 10px 16px rgba(28,28,40,.14));
      animation: idleFloat 3.8s ease-in-out .7s infinite;
    }

    .guide-media-frame {
      width: 130px;
      height: 170px;
      max-width: 100%;
      border-radius: 28px;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 15%, rgba(244,207,128,.45), transparent 55%),
        linear-gradient(180deg, rgba(255,255,255,.98), rgba(238,240,255,.92));
      border: 1px solid rgba(59,68,181,.16);
      box-shadow: 0 14px 30px rgba(28,28,40,.12);
      display: grid;
      place-items: center;
      animation: idleFloat 3.8s ease-in-out .7s infinite;
    }

    .guide-video,
    .guide-fallback-img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: center center;
    }

    .guide-fallback-img {
      object-fit: contain;
      padding: 4px;
      filter: drop-shadow(0 10px 16px rgba(28,28,40,.12));
    }

    .bubble {
      position: relative;
      background: #fff;
      border: 1px solid rgba(59,68,181,.16);
      border-radius: 18px 18px 18px 6px;
      padding: 13px 14px;
      box-shadow: 0 10px 24px rgba(28,28,40,.07);
      animation: bubbleIn .38s ease .12s both;
    }

    .bubble:before {
      content: "";
      position: absolute;
      left: -8px;
      bottom: 18px;
      width: 16px;
      height: 16px;
      background: #fff;
      border-left: 1px solid rgba(59,68,181,.16);
      border-bottom: 1px solid rgba(59,68,181,.16);
      transform: rotate(45deg);
    }

    .bubble p,
    .bubble-text { margin: 0; font-weight: 750; line-height: 1.45; }
    .bubble h3 {
      margin: 0 0 6px;
      color: var(--ih-blue);
      font-size: 17px;
      line-height: 1.25;
    }
    .bubble ul {
      margin: 8px 0 0;
      padding-left: 18px;
      font-weight: 750;
      line-height: 1.42;
    }

    .screen-card {
      background: var(--card);
      border: 1px solid rgba(59,68,181,.1);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .screen-card.try-again textarea,
    .screen-card.try-again input,
    .screen-card.try-again select,
    .screen-card.try-again .slot,
    .screen-card.try-again .tray,
    .screen-card.try-again .option-btn {
      animation: gentleShake .34s ease;
    }

    .screen-head {
      padding: 22px 18px 16px;
      background:
        linear-gradient(135deg, rgba(59,68,181,.12), rgba(244,207,128,.12)),
        #fff;
      border-bottom: 1px solid rgba(59,68,181,.08);
    }

    h1 {
      margin: 0;
      color: var(--ih-blue);
      font-size: clamp(28px, 7vw, 48px);
      line-height: .98;
      letter-spacing: -.04em;
    }

    .subcopy {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.55;
      max-width: 78ch;
    }

    .content { padding: 18px; display: grid; gap: 16px; }

    .copy-block {
      display: grid;
      gap: 10px;
      line-height: 1.6;
      font-size: 16px;
    }

    .copy-block p, .copy-block ul { margin: 0; }
    .copy-block ul { padding-left: 20px; }

    .mini-note {
      padding: 12px 13px;
      border-radius: 15px;
      background: rgba(244,207,128,.2);
      border: 1px solid rgba(244,207,128,.65);
      color: #52401d;
      font-weight: 750;
      line-height: 1.45;
    }

    .answer-reveal,
    .model-answer {
      padding: 14px;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(59,68,181,.08), rgba(188,220,110,.16));
      border: 1px solid rgba(59,68,181,.14);
      display: grid;
      gap: 12px;
    }

    .answer-reveal h3,
    .model-answer h3 {
      margin: 0;
      color: var(--ih-blue);
      font-size: 19px;
      line-height: 1.25;
    }

    .answer-reveal ul,
    .model-list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .answer-reveal li,
    .model-list li {
      background: #fff;
      border: 1px solid rgba(59,68,181,.12);
      border-radius: 15px;
      padding: 11px 12px;
      line-height: 1.45;
      box-shadow: 0 5px 14px rgba(28,28,40,.04);
    }

    .comparison-grid { display: grid; gap: 9px; }

    .comparison-item {
      border-radius: 15px;
      padding: 11px 12px;
      border: 1px solid rgba(28,28,40,.08);
      background: #fff;
      line-height: 1.45;
      font-weight: 750;
    }

    .comparison-item.ok {
      border-color: rgba(41,167,104,.25);
      background: rgba(41,167,104,.08);
      color: #17643e;
    }

    .comparison-item.check {
      border-color: rgba(243,171,99,.42);
      background: rgba(243,171,99,.16);
      color: #71410e;
    }

    .task-card {
      border: 1px solid rgba(59,68,181,.12);
      border-radius: 18px;
      padding: 14px;
      background: #fff;
      box-shadow: var(--shadow-soft);
      display: grid;
      gap: 12px;
    }

    .task-title {
      margin: 0;
      font-size: 18px;
      line-height: 1.25;
      letter-spacing: -.015em;
      color: var(--ih-blue);
    }

    .options { display: flex; flex-wrap: wrap; gap: 9px; }

    .option-btn,
    .small-btn,
    .primary-btn,
    .ghost-btn {
      border-radius: 999px;
      padding: 10px 13px;
      min-height: 43px;
      font-weight: 850;
      transition: transform .15s ease, background .15s ease, box-shadow .15s ease, border-color .15s ease;
    }

    .option-btn {
      background: #fff;
      border: 1px solid rgba(59,68,181,.2);
      color: var(--ink);
      box-shadow: 0 5px 14px rgba(28,28,40,.05);
    }

    .option-btn:hover, .small-btn:hover, .primary-btn:hover, .ghost-btn:hover { transform: translateY(-1px); }

    .option-btn.selected {
      background: var(--ih-blue);
      color: #fff;
      border-color: var(--ih-blue);
      box-shadow: 0 9px 24px rgba(59,68,181,.24);
    }

    .primary-btn {
      background: var(--ih-blue);
      color: #fff;
      box-shadow: 0 10px 24px rgba(59,68,181,.22);
    }

    .ghost-btn {
      background: #fff;
      color: var(--ih-blue);
      border: 1px solid rgba(59,68,181,.22);
    }

    .small-btn {
      background: rgba(59,68,181,.09);
      color: var(--ih-blue);
      padding: 8px 10px;
      min-height: 36px;
      border: 1px solid rgba(59,68,181,.1);
      font-size: 13px;
    }

    textarea, input[type="text"], select {
      width: 100%;
      border: 1px solid rgba(59,68,181,.18);
      background: #fff;
      border-radius: 16px;
      padding: 13px 14px;
      color: var(--ink);
      outline: 0;
      box-shadow: inset 0 1px 0 rgba(28,28,40,.03);
      transition: border-color .15s ease, box-shadow .15s ease;
    }

    textarea { min-height: 110px; resize: vertical; line-height: 1.5; }

    textarea:focus, input[type="text"]:focus, select:focus {
      border-color: var(--ih-blue);
      box-shadow: 0 0 0 4px rgba(59,68,181,.1);
    }

    label {
      display: grid;
      gap: 7px;
      font-weight: 850;
      line-height: 1.35;
    }

    .hint { color: var(--muted); font-size: 14px; font-weight: 650; }

    .feedback {
      border-radius: 16px;
      padding: 13px 14px;
      line-height: 1.5;
      font-weight: 750;
      border: 1px solid transparent;
      animation: pop .22s ease both;
    }

    .feedback.success {
      background: rgba(41,167,104,.12);
      border-color: rgba(41,167,104,.28);
      color: #17643e;
      animation: correctPulse .65s ease both;
    }

    .feedback.warn {
      background: rgba(243,171,99,.18);
      border-color: rgba(243,171,99,.42);
      color: #71410e;
    }

    .feedback.info {
      background: rgba(59,68,181,.1);
      border-color: rgba(59,68,181,.18);
      color: var(--ih-blue);
    }

    .rank-list, .pool, .slots, .tray-grid, .match-grid, .criteria-grid { display: grid; gap: 10px; }

    .rank-item,
    .draggable-card,
    .slot,
    .tray,
    .match-row,
    .criterion-card,
    .statement-card {
      border: 1px solid rgba(59,68,181,.14);
      background: #fff;
      border-radius: 16px;
      padding: 12px;
      box-shadow: 0 6px 16px rgba(28,28,40,.045);
    }

    .rank-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 10px;
    }

    .rank-num {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: var(--ih-blue);
      color: #fff;
      font-weight: 950;
      font-size: 14px;
    }

    .rank-title { font-weight: 900; line-height: 1.3; }

    .rank-desc {
      margin-top: 3px;
      color: var(--muted);
      font-weight: 650;
      font-size: 14px;
      line-height: 1.35;
    }

    .rank-actions { display: flex; flex-direction: column; gap: 5px; }

    .draggable-card {
      user-select: none;
      font-weight: 800;
      line-height: 1.38;
      cursor: grab;
      border-left: 6px solid var(--ih-blue);
      transition: transform .15s ease, box-shadow .15s ease, opacity .15s ease;
    }

    .draggable-card:hover { transform: translateY(-1px); box-shadow: 0 9px 20px rgba(28,28,40,.08); }
    .draggable-card.selected-card { outline: 4px solid rgba(244,207,128,.58); }

    .pool { grid-template-columns: 1fr; }

    .slot, .tray {
      min-height: 70px;
      background:
        linear-gradient(180deg, rgba(59,68,181,.04), rgba(59,68,181,.015)),
        #fff;
      display: grid;
      align-content: start;
      gap: 8px;
    }

    .slot[data-empty="true"]:after {
      content: "Tap/drag a card here";
      color: rgba(103,106,123,.72);
      font-weight: 750;
    }

    .slot-title, .tray-title {
      color: var(--ih-blue);
      font-weight: 950;
      line-height: 1.3;
      margin-bottom: 2px;
    }

    .tray { min-height: 160px; }
    .tray-grid { grid-template-columns: 1fr; }
    .slot-group { display: grid; gap: 10px; }

    .placed-mini {
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      width: 100%;
      border-radius: 13px;
      padding: 10px 11px;
      background: #fff;
      border: 1px solid rgba(59,68,181,.16);
      box-shadow: 0 4px 12px rgba(28,28,40,.04);
      color: var(--ink);
      font-weight: 850;
      text-align: left;
    }

    .remove-x { color: var(--muted); font-size: 13px; font-weight: 950; }

    .question-grid { display: grid; gap: 12px; }
    .match-row { display: grid; gap: 8px; }
    .match-prompt { font-weight: 850; line-height: 1.35; }
    .two-col { display: grid; gap: 12px; }

    .badge-wall {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 10px;
    }

    .badge-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px;
      border-radius: 16px;
      background: #fff;
      border: 1px solid rgba(28,28,40,.08);
      box-shadow: 0 7px 18px rgba(28,28,40,.055);
      font-weight: 900;
      line-height: 1.25;
      animation: badgePop .32s cubic-bezier(.2,.9,.2,1.25);
    }

    .badge-icon {
      width: 36px;
      height: 36px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border-radius: 13px;
      color: #fff;
      font-size: 20px;
      font-weight: 950;
    }

    .criteria-grid { grid-template-columns: 1fr; }
    .criterion-card { display: grid; gap: 9px; }

    .checkline {
      display: flex;
      align-items: center;
      gap: 9px;
      font-weight: 800;
      color: var(--muted);
    }

    .checkline input { width: 20px; height: 20px; accent-color: var(--ih-blue); }

    .statement-card { display: grid; gap: 10px; }
    .statement-title { font-weight: 850; line-height: 1.45; }
    .radio-row { display: flex; flex-wrap: wrap; gap: 8px; }

    .radio-pill input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .radio-pill span {
      display: inline-flex;
      align-items: center;
      min-height: 39px;
      padding: 8px 11px;
      border-radius: 999px;
      border: 1px solid rgba(59,68,181,.2);
      background: #fff;
      color: var(--ink);
      font-weight: 850;
      transition: .15s ease;
    }

    .radio-pill input:checked + span {
      background: var(--ih-blue);
      border-color: var(--ih-blue);
      color: #fff;
      box-shadow: 0 8px 18px rgba(59,68,181,.2);
    }

    .nav-shell {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 30;
      background: rgba(251,251,253,.9);
      backdrop-filter: blur(16px);
      border-top: 1px solid rgba(59,68,181,.12);
    }

    .nav-inner {
      width: min(var(--max), calc(100% - 24px));
      margin: 0 auto;
      padding: 10px 0;
      display: grid;
      grid-template-columns: 64px 1fr 110px;
      align-items: center;
      gap: 10px;
    }

    .arrow-btn {
      min-height: 50px;
      border-radius: 18px;
      background: #fff;
      color: var(--ih-blue);
      border: 1px solid rgba(59,68,181,.18);
      font-weight: 1000;
      font-size: 22px;
      box-shadow: 0 7px 18px rgba(28,28,40,.06);
      transition: .18s ease;
    }

    .arrow-btn.next-ready {
      background: var(--ih-blue);
      color: #fff;
      animation: unlockPulse .52s ease;
    }

    .arrow-btn.locked {
      background: #e9eaf1;
      color: #9a9cab;
      border-color: #e0e1e8;
      box-shadow: none;
    }

    .nav-msg {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
      font-weight: 750;
      text-align: center;
    }

    footer {
      width: min(var(--max), calc(100% - 24px));
      margin: 0 auto;
      padding: 16px 0 96px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 12px;
      gap: 8px;
    }

    footer img {
      max-height: 30px;
      max-width: 160px;
      object-fit: contain;
      opacity: .88;
    }

    .result-panel { display: grid; gap: 15px; }

    .result-hero {
      padding: 18px;
      border-radius: 22px;
      background:
        radial-gradient(circle at 80% 10%, rgba(244,207,128,.52), transparent 18rem),
        linear-gradient(135deg, var(--ih-blue), var(--violet));
      color: #fff;
      box-shadow: var(--shadow);
      animation: resultIn .55s cubic-bezier(.2,.9,.2,1.1) both;
    }

    .result-hero h2 {
      margin: 0 0 8px;
      font-size: clamp(29px, 8vw, 52px);
      line-height: .95;
      letter-spacing: -.04em;
    }

    .result-name {
      margin: 0 0 12px;
      font-size: clamp(20px, 5vw, 30px);
      font-weight: 1000;
      line-height: 1.05;
    }

    .result-stats {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 15px;
    }

    .stat-box {
      padding: 13px;
      border-radius: 18px;
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.2);
    }

    .stat-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .06em;
      font-weight: 950;
      opacity: .82;
    }

    .stat-value { margin-top: 3px; font-size: 25px; font-weight: 1000; }

    .share-wrap {
      display: grid;
      place-items: center;
      padding: 14px;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(59,68,181,.08), rgba(244,207,128,.12));
      border: 1px solid rgba(59,68,181,.12);
      animation: resultIn .55s cubic-bezier(.2,.9,.2,1.1) .12s both;
    }

    .share-card {
      width: min(360px, 100%);
      aspect-ratio: 9 / 16;
      border-radius: 32px;
      padding: 22px;
      color: #fff;
      background:
        radial-gradient(circle at 30% 12%, rgba(244,207,128,.8), transparent 9rem),
        radial-gradient(circle at 90% 62%, rgba(224,112,163,.6), transparent 12rem),
        linear-gradient(160deg, var(--ih-blue), var(--violet) 58%, var(--plum));
      box-shadow: 0 24px 70px rgba(59,68,181,.32);
      display: grid;

    @media (prefers-reduced-motion: reduce) {

    @media (max-width: 739px) {

      .guide-card.guide-react .guide-img-wrap,

    @keyframes guideIn {
      0% { opacity: 0; transform: translateX(-20px) translateY(8px); }
      70% { opacity: 1; transform: translateX(3px) translateY(-4px); }
      100% { opacity: 1; transform: translateX(0) translateY(0); }
    }

    @keyframes idleFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    @keyframes bubbleIn {
      0% { opacity: 0; transform: scale(.96) translateY(5px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    @keyframes guideCharacterPop {
      0% { transform: translateY(8px) scale(.95); }
      55% { transform: translateY(-8px) scale(1.06); }
      78% { transform: translateY(2px) scale(.99); }
      100% { transform: translateY(0) scale(1); }
    }

    @keyframes guideBubbleReact {
      0% { opacity: .55; transform: translateY(12px) scale(.94); }
      52% { opacity: 1; transform: translateY(-5px) scale(1.04); }
      76% { transform: translateY(2px) scale(.99); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes mobileGuideReact {
      0% { opacity: 0; transform: translateY(42px) scale(.94); }
      58% { opacity: 1; transform: translateY(-8px) scale(1.03); }
      78% { transform: translateY(3px) scale(.99); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes pop {
      0% { opacity: 0; transform: scale(.98); }

    }

    @keyframes correctPulse {
      0% { opacity: 0; transform: scale(.98); box-shadow: 0 0 0 0 rgba(41,167,104,.0); }
      35% { opacity: 1; transform: scale(1.01); box-shadow: 0 0 0 8px rgba(41,167,104,.09); }
      100% { opacity: 1; transform: scale(1); box-shadow: 0 0 0 0 rgba(41,167,104,.0); }

      0% { opacity: 0; transform: scale(.86) rotate(-2deg); }
      100% { opacity: 1; transform: scale(1) rotate(0); }
    }

    @keyframes unlockPulse {
      0% { transform: scale(.96); box-shadow: 0 0 0 0 rgba(59,68,181,.25); }
      55% { transform: scale(1.03); box-shadow: 0 0 0 9px rgba(59,68,181,.08); }
      100% { transform: scale(1); box-shadow: 0 10px 24px rgba(59,68,181,.22); }
    }

    @keyframes resultIn {
      0% { opacity: 0; transform: translateY(18px) scale(.98); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes toastIn {
      0% { opacity: 0; transform: translateX(-50%) translateY(12px); }
      100% { opacity: 1; transform: translateX(-50%) translateY(0); }

    @keyframes fall {

      100% { transform: translateY(calc(100vh + 40px)) rotate(520deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand-row">
          <div class="brand" id="brandTap" aria-label="InterPress International House Almaty-Astana">
            <img src="interpress-logo.png" alt="InterPress International House Almaty-Astana" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
            <div class="brand-fallback">
              <span class="brand-fallback-mark">ih</span>
              <span>InterPress International House</span>
            </div>
          </div>
          <div class="status-pills" aria-live="polite">
            <span class="pill xp-pill" id="xpPill">XP: 0/1100</span>
          </div>
        </div>
        <div class="progress-track" aria-hidden="true">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>
    </header>

    <main id="appMain"></main>

    <footer>
      <span>Co-brand:</span>
      <img src="ih-world-logo.png" alt="IH World Organisation" onerror="this.style.display='none';">
    </footer>

    <nav class="nav-shell" aria-label="Lesson navigation">
      <div class="nav-inner">
        <button class="arrow-btn" id="backBtn" type="button" aria-label="Back">в†ђ</button>
        <div class="nav-msg" id="navMsg">Finish the thinking task to unlock forward.</div>
        <button class="arrow-btn locked" id="nextBtn" type="button" aria-label="Next" title="Finish the thinking task to unlock forward.">в†’</button>
      </div>
    </nav>
  </div>

  <div id="toastMount"></div>
  <div id="devMount"></div>

  <script>
    const REAL_STORAGE_KEY = "ielts_lesson1_orientation_v3";
    const DEV_STORAGE_KEY = "ielts_lesson1_orientation_dev_v3";
    const MAX_XP = 1100;

    function hashWantsDev() {
      return location.hash === "#dev" || location.hash.startsWith("#dev-");
    }

    let devMode = hashWantsDev();

    const badgeMeta = {
      firstInstinct: { name: "First Instinct", icon: "вљЎ", color: "var(--pink)", text: "You made a prediction before the reveal вЂ” and your exam map was sharp." },
      trapSpotter: { name: "Trap Spotter", icon: "рџ•µпёЏ", color: "var(--magenta)", text: "You caught one of the classic IELTS confusion traps before it caught you." },
      modeHacker: { name: "Mode Hacker", icon: "рџ’»", color: "var(--violet)", text: "You separated the exam from the interface. That is how smart test-takers prepare." },
      roundingHacker: { name: "Rounding Hacker", icon: "рџЋЇ", color: "var(--plum)", text: "You calculated the score rule instead of guessing. Clean." },
      mapmaker: { name: "Mapmaker", icon: "рџ—єпёЏ", color: "var(--lime)", text: "You turned IELTS facts into your own study map." }
    };

    const badgeOrder = ["firstInstinct", "trapSpotter", "modeHacker", "roundingHacker", "mapmaker"];

    const agendaCards = [
      { id: "types", title: "Which IELTS am I actually preparing for?", desc: "Academic or General Training вЂ” and what really changes?", screen: 4 },
      { id: "day", title: "What happens on test day?", desc: "Which sections come first, and where does Speaking fit?", screen: 3 },
      { id: "timing", title: "How much time do I really have?", desc: "What are the timings, question counts, tasks, parts, and sections?", screen: 5 },
      { id: "brain", title: "What does each section ask my brain to do?", desc: "Listening, Reading, Writing, and Speaking are not the same kind of challenge.", screen: [6,7,8,9,10] },
      { id: "mode", title: "Paper or computer: what changes?", desc: "Same exam content, different practical experience вЂ” and some details depend on your provider or centre.", screen: 11 },
      { id: "score", title: "How does scoring work?", desc: "What is a band score, what is rounding, and why XP in this module is not a real IELTS result?", screen: 12 },
      { id: "rumours", title: "Which IELTS rumours are dangerous?", desc: "What should I stop believing before I start serious practice?", screen: 13 }
    ];

    const screenTitles = [
      "Welcome: Your First IELTS Map",
      "Today We Cover",
      "Your IELTS Starting Point",
      "Build the Test-Day Shape",
      "Academic or General: What Changes?",
      "Timing and Task-Count Reality Check",
      "Listening: From Everyday to Academic",
      "Reading: Same Clock, Different Texts",
      "Reading Task Types: What Is the Question Really Asking?",
      "Writing: Two Tasks, Unequal Weight",
      "Speaking: From Familiar to Abstract",
      "Paper vs Computer: Same Test, Different Muscle Memory",
      "Scoring: Calculate, DonвЂ™t Guess",
      "IELTS Rumour Filter",
      "Your Personal IELTS Map",
      "Your IELTS Orientation Result"
    ];

    const guideLines = [
      "Before you practise random tasks, build the map. Type your name and make one honest prediction first.",
      "Choose what you most want to understand. Your priority will return later.",
      "Start with what you think is true now. Not sure is a valid answer.",
      "Build the route: hear first, read second, write third вЂ” and place Speaking carefully.",
      "Academic and General are not four different tests. Sort the skills by what really changes.",
      "Guess first. Then replace rumours with a usable exam map.",
      "Track the climb from everyday listening to academic listening.",
      "Same clock. Different text world. Watch the transfer-time trap.",
      "A question type is a command. Match the label to the thinking job.",
      "Build the Writing system. Task 2 is not just longer вЂ” it counts more.",
      "Part 1 is familiar. Part 2 is extended. Part 3 becomes abstract.",
      "Same exam content, different muscle memory. Some details must be checked locally.",
      "Calculate the scoring rule. XP here is practice for the scoring logic.",
      "Bad advice sounds confident. Filter it through the exam map.",
      "Write your own IELTS map first. Then compare it with the expert map.",
      "You completed Lesson 1. Your result shows your lesson progress."
    ];

    const initialImages = [
      "Welcome.png", "Pointing.png", "Thinking.png", "Pointing.png", "Pointing.png", "Pointing.png",
      "Pointing.png", "Pointing.png", "Pointing.png", "Pointing.png", "Pointing.png", "Pointing.png",
      "Pointing.png", "Pointing.png", "Thinking.png", "Celebration.png"
    ];

    const xpMax = [50,50,60,60,60,80,80,75,75,85,75,90,85,90,85,0];

    let state = loadState();
    const hashScreen = location.hash.match(/^#(?:dev-)?screen-(\d+)$/);
    if (hashScreen) state.screen = Math.max(0, Math.min(15, Number(hashScreen[1]) - 1));

    let selectedCardId = null;
    let dPresses = [];
    let logoTaps = [];
    let lastXpDisplayed = totalXp();
    let guideReaction = { screen: null, token: 0 };

    function currentStorageKey() {
      return devMode ? DEV_STORAGE_KEY : REAL_STORAGE_KEY;
    }

    function defaultState() {
      return {
        screen: 0,
        answers: {},
        completed: {},
        xp: {},
        attempts: {},
        feedback: {},
        badges: {},
        flags: {},
        ui: { shareOpen: true, trickyOpen: false, finished: false }
      };
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(currentStorageKey());
        if (!raw) return defaultState();
        return { ...defaultState(), ...JSON.parse(raw) };
      } catch {
        return defaultState();
      }
    }

    function saveState() {
      localStorage.setItem(currentStorageKey(), JSON.stringify(state));
    }

    function totalXp() {
      return Object.values(state.xp || {}).reduce((sum, n) => sum + Number(n || 0), 0);
    }

    function wordCount(str) {
      return String(str || "").trim().split(/\s+/).filter(Boolean).length;
    }

    function hasVerb(str) {
      const text = String(str || "").toLowerCase();
      const verbWords = [
        "am","is","are","was","were","be","being","been","have","has","had","do","does","did",
        "can","could","will","would","should","must","may","might","want","need","think","feel",
        "know","understand","learn","prepare","practise","practice","check","take","write","read",
        "speak","listen","manage","use","get","make","build","see","change","mean","matters",
        "matter","differ","differs","stay","stays","share","shares","give","gives","count","counts",
        "work","works","study","choose","watch","focus","improve","remember","plan","help","helps",
        "ask","asks","start","starts"
      ];
      if (verbWords.some(v => new RegExp(`\\b${v}\\b`, "i").test(text))) return true;
      if (/\b\w+(ing|ed)\b/i.test(text)) return true;
      if (/\b(i'm|you're|he's|she's|it's|we're|they're|iвЂ™ll|i'd|iвЂ™ve|don't|doesn't|can't|won't)\b/i.test(text)) return true;
      return false;
    }

    function isCompleteShortSentence(str) {
      const clean = String(str || "").trim();
      return wordCount(clean) >= 4 && hasVerb(clean);
    }

    function esc(str) {
      return String(str ?? "").replace(/[&<>"']/g, m => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#039;" }[m]));
    }

    function isCompleted(i = state.screen) {
      return !!state.completed[i];
    }

    function getAnswer(key, fallback = "") {
      return state.answers[key] ?? fallback;
    }

    function setAnswer(key, value) {
      state.answers[key] = value;
      saveState();
    }

    function setFeedback(i, type, html, bubbleHtml = html) {
      state.feedback[i] = { type, html, bubbleHtml };
      guideReaction = { screen: i, token: guideReaction.token + 1 };
      saveState();
    }

    function attempt(i) {
      if (state.completed[i]) return state.attempts[i] || 0;
      state.attempts[i] = (state.attempts[i] || 0) + 1;
      saveState();
      return state.attempts[i];
    }

    function award(i, amount) {
      const old = totalXp();
      if (state.xp[i] === undefined) {
        state.xp[i] = amount;
        saveState();
        animateXp(old, totalXp());
      }
    }

    function complete(i, amount) {
      state.completed[i] = true;
      award(i, amount);
      saveState();
      render();
    }

    function submitScreen(i, isCorrect, fullXp, hintHtml, answerHtml, options = {}) {
      if (state.completed[i]) {
        render();
        return;
      }

      const n = attempt(i);
      state.flags.tryAgainScreen = null;

      if (options.beforeDecision) options.beforeDecision(isCorrect, n);

      if (isCorrect) {
        if (options.revealOnCorrect) state.flags[`reveal_${i}`] = true;
        const earned = n === 1 ? fullXp : Math.round(fullXp / 2);
        if (options.onCorrect) options.onCorrect(n);
        setFeedback(i, "success", options.successHtml || "Correct. Forward is unlocked.");
        complete(i, earned);
        return;
      }

      if (n === 1) {
        state.flags.tryAgainScreen = i;
        setFeedback(i, "warn", `${hintHtml}<br><br><strong>You've got one more attempt вЂ” fix it to continue.</strong>`);
        saveState();
        render();
        return;
      }

      if (options.onReveal) options.onReveal();
      state.flags[`reveal_${i}`] = true;
      setFeedback(
        i,
        "info",
        `${answerHtml}<br><br><strong>Forward unlocked. Review the answer, then continue.</strong>`,
        "Forward unlocked. Review the answer, then continue."
      );
      complete(i, 0);
    }

    function unlockBadge(key, secondText) {
      if (state.badges[key]) return;
      state.badges[key] = true;
      saveState();
      const meta = badgeMeta[key];
      toast(`<strong>Badge unlocked: ${meta.name}</strong><span>${secondText || meta.text}</span>`);
      setTimeout(() => render(), 650);
    }

    function animateXp(from, to) {
      const start = performance.now();
      const dur = 650;
      function frame(now) {
        const t = Math.min(1, (now - start) / dur);
        const eased = 1 - Math.pow(1 - t, 3);
        const val = Math.round(from + (to - from) * eased);
        document.getElementById("xpPill").textContent = `XP: ${val}/${MAX_XP}`;
        if (t < 1) requestAnimationFrame(frame);
        else lastXpDisplayed = to;
      }
      requestAnimationFrame(frame);
    }

    function toast(html) {
      const mount = document.getElementById("toastMount");
      mount.innerHTML = `<div class="toast">${html}</div>`;
      setTimeout(() => { mount.innerHTML = ""; }, 4200);
    }

    function updateChrome() {

      document.getElementById("progressFill").style.width = `${(current / 16) * 100}%`;

      const back = document.getElementById("backBtn");
      const next = document.getElementById("nextBtn");
      const msg = document.getElementById("navMsg");

      back.disabled = state.screen === 0;
      back.classList.toggle("locked", state.screen === 0);

      const canGoNext = state.screen < 15 && isCompleted();
      next.disabled = !canGoNext;
      next.classList.toggle("locked", !canGoNext);
      next.classList.toggle("next-ready", canGoNext);
      next.textContent = canGoNext ? "Next в†’" : "в†’";
      next.title = canGoNext ? "Next" : "Finish the thinking task to unlock forward.";

      if (state.screen === 15) {
        msg.textContent = "Result screen.";
        next.disabled = true;
        next.classList.add("locked");
        next.classList.remove("next-ready");
      } else if (canGoNext) {
        msg.textContent = "Forward unlocked. Your answer is saved.";
      } else if ((state.attempts[state.screen] || 0) === 1) {
        msg.textContent = "You've got one more attempt вЂ” fix it to continue.";
      } else {
        msg.textContent = "Finish the thinking task to unlock forward.";

      if (state.screen === 15) return state.ui.trickyOpen ? "Pointing.png" : "Celebration.png";

    function cardPool(cards, placements) {

    function dropSlot(slotId, title, cards, placements) {
      const id = placements?.[slotId] || "";
      const card = cards.find(c => c.id === id);
      return `
        <div class="slot" data-slot="${slotId}" data-empty="${card ? "false" : "true"}">
          <div class="slot-title">${esc(title)}</div>
          ${card ? `<button class="placed-mini" data-remove-slot="${slotId}" type="button">${esc(card.label)} <span class="remove-x">remove</span></button>` : ""}
        </div>
      `;
    }

    function bindPlacement(cards, key, multi = false) {
      document.querySelectorAll("[data-card]").forEach(el => {
        el.addEventListener("click", () => {
          selectedCardId = el.dataset.card;
          document.querySelectorAll("[data-card]").forEach(x => x.classList.toggle("selected-card", x.dataset.card === selectedCardId));
        });
        el.addEventListener("dragstart", ev => ev.dataTransfer.setData("text/plain", el.dataset.card));
      });

      document.querySelectorAll("[data-slot],[data-tray]").forEach(zone => {
        zone.addEventListener("dragover", ev => ev.preventDefault());
        zone.addEventListener("drop", ev => {
          ev.preventDefault();
          const card = ev.dataTransfer.getData("text/plain");
          placeCard(key, zone.dataset.slot || zone.dataset.tray, card, multi);
        });
        zone.addEventListener("click", ev => {
          if (ev.target.closest("[data-remove-slot],[data-remove-card]")) return;
          if (selectedCardId) placeCard(key, zone.dataset.slot || zone.dataset.tray, selectedCardId, multi);
        });
      });

      document.querySelectorAll("[data-remove-slot]").forEach(btn => {
        btn.addEventListener("click", () => {
          const data = { ...(state.answers[key] || {}) };
          delete data[btn.dataset.removeSlot];
          setAnswer(key, data);
          selectedCardId = null;
          render();
        });

          part2_format:"B. Long turn. You get a task card, 1 minute to prepare, then speak for up to 2 minutes. The part takes about 3вЂ“4 minutes including preparation.",
          part2_skill:"E. Speaking at length on a given topic, using appropriate language and organising ideas logically.",
          part3_format:"C. Discussion linked to Part 2, but more general and abstract. About 4вЂ“5 minutes.",
          part3_skill:"F. Explaining opinions and analysing, discussing, and speculating about issues."
        },
        mode_sort: { paper:["1","4"], computer:["2","7"], same:["3","6"], check:["5","8","9"] },
        calc1: "6.5",
        calc2: "7.0",
        criteria: {
          "Task achievement / response": { writing:true, speaking:false },
          "Coherence and cohesion": { writing:true, speaking:false },
          "Lexical resource": { writing:true, speaking:true },
          "Grammatical range and accuracy": { writing:true, speaking:true },
          "Fluency and coherence": { writing:false, speaking:true },
          "Pronunciation": { writing:false, speaking:true }
        },
        rumours: {
          1:"False",
          2:"False",
          3:"True",
          4:"False",
          5:"True",
          6:"Check provider / centre",
          7:"False",
          8:"True",
          9:"Check provider / centre"
        },
        map1: "I am probably preparing for Academic IELTS, and Reading and Writing differ.",
        map2: "The main test block is Listening, Reading, and Writing, while Speaking is scheduled separately.",
        map3: "I should watch Reading carefully because there is no extra transfer time.",
        map4: "My delivery mode is probably computer, so I must practise typing and screen navigation.",
        map5: "My Speaking worry changes because I now know the speaking test has three clear parts."
      };

      state.flags.reveal_14 = true;
      state.feedback[14] = {
        type: "success",
        html: "Good. You have a working IELTS map, not just a list of facts. Compare it with the expert map below."
      };

      saveState();
      toast("<strong>Test data filled.</strong><span>Personalised screens and result preview now have sample values.</span>");
      render();
    }

    function setDevMax(on) {
      if (!devMode) return;

      state.flags.devMax = on;

      if (on) {
        if (!state.flags.devMaxSnapshot) {
          state.flags.devMaxSnapshot = {
            xp: { ...(state.xp || {}) },
            completed: { ...(state.completed || {}) },
            badges: { ...(state.badges || {}) }
          };
        }

        state.xp = {};
        xpMax.forEach((xp, i) => { if (xp > 0) state.xp[i] = xp; });

        state.completed = {};
        for (let i = 0; i <= 14; i++) state.completed[i] = true;

        state.badges = {};
        badgeOrder.forEach(k => state.badges[k] = true);
      } else {
        const snap = state.flags.devMaxSnapshot;
        if (snap) {
          state.xp = snap.xp || {};
          state.completed = snap.completed || {};
          state.badges = snap.badges || {};
        } else {
          state.xp = {};
          state.completed = {};
          state.badges = {};
        }
        delete state.flags.devMaxSnapshot;
      }

      saveState();
      render();
    }

    function resetDevState() {
      if (!devMode) return;
      localStorage.removeItem(DEV_STORAGE_KEY);
      state = defaultState();
      state.flags.devModeOn = true;
      saveState();
      toast("<strong>Dev state reset.</strong><span>Student state was not touched.</span>");
      render();
    }

    function confetti() {
      if (window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
      const colors = ["#3B44B5","#29A768","#F3AB63","#F4CF80","#F06C6A","#E070A3","#C2598E","#913371","#5C3E9B","#BCDC6E"];
      for (let i = 0; i < 60; i++) {
        const piece = document.createElement("div");
        piece.className = "confetti-piece";
        piece.style.left = `${Math.random() * 100}vw`;
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDelay = `${Math.random() * 550}ms`;
        piece.style.transform = `rotate(${Math.random() * 180}deg)`;
        document.body.appendChild(piece);
        setTimeout(() => piece.remove(), 1900);
      }
    }

    function goTo(i, push = true) {
      state.screen = Math.max(0, Math.min(15, i));
      saveState();
      if (push) {
        const hash = devMode ? `#dev-screen-${state.screen + 1}` : `#screen-${state.screen + 1}`;
        history.pushState({ screen: state.screen, dev: devMode }, "", hash);
      }
      selectedCardId = null;
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    document.getElementById("backBtn").addEventListener("click", () => {
      if (state.screen > 0) goTo(state.screen - 1);
    });

    document.getElementById("nextBtn").addEventListener("click", () => {
      if (state.screen < 15 && isCompleted()) goTo(state.screen + 1);
    });

    document.addEventListener("keydown", e => {
      const tag = (e.target && e.target.tagName || "").toLowerCase();
      if (["input", "textarea", "select"].includes(tag)) return;

      if (e.key && e.key.toLowerCase() === "d") {
        const now = Date.now();
        dPresses = dPresses.filter(t => now - t < 900);
        dPresses.push(now);
        if (dPresses.length >= 3) {
          dPresses = [];
          toggleDevMode();
        }
      } else {
        dPresses = [];
      }
    });

    document.getElementById("brandTap").addEventListener("click", () => {
      const now = Date.now();
      logoTaps = logoTaps.filter(t => now - t < 1400);
      logoTaps.push(now);
      if (logoTaps.length >= 5) {
        logoTaps = [];
        toggleDevMode();
      }
    });

    window.addEventListener("hashchange", () => {
      if (hashWantsDev() && !devMode) enableDevMode();
    });

    window.addEventListener("popstate", ev => {
      const s = ev.state?.screen;
      if (typeof s === "number") {
        if (ev.state?.dev && !devMode) enableDevMode();
        state.screen = s;
        saveState();
        render();
      }
    });

    if (devMode) {
      state.flags.devModeOn = true;
      saveState();
      if (location.hash === "#dev") {
        history.replaceState({ screen: state.screen, dev: true }, "", `#dev-screen-${state.screen + 1}`);
      }
    } else if (!location.hash.startsWith("#screen-")) {
      history.replaceState({ screen: state.screen, dev: false }, "", `#screen-${state.screen + 1}`);
    }

    render();
  </script>
</body>
</html>
